name: 更新 CCTV 直播 m3u8 (每小时)

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 系统信息
        run: |
          echo "🕒 开始时间: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🐧 系统: $(uname -a)"
          echo "🔍 Python: $(python --version)"

      # ==================== Python 环境 ====================
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq iputils-ping dnsutils \
            libegl1 libopus0 libwoff1 libvpx9 libevent-2.1-7t64 libwebp7 \
            libwebpdemux2 libenchant-2-2 libhyphen0 libgles2 libx264-164 \
            libxkbcommon0 libatspi2.0-0 libasound2t64 libdbus-1-3 libdrm2 \
            libgbm1 libnspr4 libnss3 libwayland-client0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libxtst6

      - name: 安装 Python 依赖和 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      # ==================== 直连网络诊断（加强 Ping） ====================
      - name: 直连网络详细诊断 + Ping
        run: |
          echo "🌐 === 直连网络诊断 ==="
          echo "🕒 时间: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          
          echo "🔍 DNS 解析:"
          dig +short m-live.cctvnews.cctv.com
          
          echo "🏓 Ping CCTV 域名:"
          ping -c 6 m-live.cctvnews.cctv.com || true
          
          echo "🏓 Ping Google:"
          ping -c 4 www.google.com || true
          
          echo "🌍 curl 测试 CCTV:"
          curl -I --max-time 12 -s https://m-live.cctvnews.cctv.com | head -n 8 || echo "CCTV 直连失败"
          
          echo "🌍 curl 测试 Google:"
          curl -I --max-time 10 -s https://www.google.com | head -n 5 || echo "Google 直连失败"
          
          echo "🔍 当前出口 IP: $(curl -s https://ipinfo.io/ip)"

      # ==================== 启动 Clash Meta ====================
      - name: 启动 Clash Meta 代理
        run: |
          echo "🚀 === 启动 Clash Meta ==="
          VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "📌 版本: $VERSION"
          
          curl -L --retry 3 --retry-delay 5 -o mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${VERSION}/mihomo-linux-amd64-compatible-${VERSION}.gz"
          
          gzip -d mihomo.gz && mv mihomo clash && chmod +x clash
          
          mkdir -p config
          cat > config/config.yaml << 'EOF'
          mixed-port: 7890
          mode: rule
          log-level: info
          allow-lan: true
          ipv6: false
          
          proxy-providers:
            MySub:
              type: http
              url: "${{ secrets.CLASH_SUBSCRIPTION }}"
              interval: 7200
              path: ./MySub.yaml
              health-check:
                enable: true
                url: https://www.gstatic.com/generate_204
                interval: 300
          
          proxy-groups:
            - name: Proxy
              type: select
              use:
                - MySub
              proxies: []
          
          rules:
            - MATCH,Proxy
          EOF
          
          ./clash -d config > clash.log 2>&1 &
          echo $! > clash.pid
          
          echo "⏳ 等待 Clash 启动 (15秒)..."
          sleep 15
          
          if curl -x http://127.0.0.1:7890 -I --max-time 12 -s https://www.google.com > /dev/null; then
            echo "✅ Clash 代理启动成功"
            echo "🌍 代理 IP: $(curl -x http://127.0.0.1:7890 -s https://ipinfo.io/ip)"
          else
            echo "❌ Clash 启动失败"
            cat clash.log
            exit 1
          fi

      # ==================== 代理下网络诊断（加强 Ping） ====================
      - name: 代理下网络诊断 + Ping
        env:
          http_proxy: http://127.0.0.1:7890
          https_proxy: http://127.0.0.1:7890
        run: |
          echo "🌐 === 代理下网络诊断 ==="
          
          echo "🏓 代理 Ping CCTV:"
          ping -c 6 m-live.cctvnews.cctv.com || true
          
          echo "🏓 代理 Ping Google:"
          ping -c 4 www.google.com || true
          
          echo "🌍 代理 curl CCTV:"
          curl -x http://127.0.0.1:7890 -I --max-time 15 -s https://m-live.cctvnews.cctv.com | head -n 10 || echo "代理 CCTV 失败"
          
          echo "🌍 代理 curl Google:"
          curl -x http://127.0.0.1:7890 -I --max-time 10 -s https://www.google.com | head -n 6 || echo "代理 Google 失败"

      # ==================== 执行脚本 ====================
      - name: 运行 CCTV m3u8 提取脚本
        env:
          http_proxy: http://127.0.0.1:7890
          https_proxy: http://127.0.0.1:7890
          all_proxy: http://127.0.0.1:7890
        run: |
          echo "🎬 === 开始执行 Python 脚本 ==="
          python cctv_m3u_extractor.py
          echo "✅ 脚本执行完成"

      - name: 检查并提交更新
        run: |
          if git diff --quiet cctv.m3u; then
            echo "📌 无更新"
          else
            echo "🔄 提交更新..."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add cctv.m3u
            git commit -m "📺 自动更新 CCTV m3u8 $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 最终总结
        run: |
          echo "========================================"
          echo "🎉 Workflow 执行完成"
          echo "🕒 结束时间: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📁 文件大小: $(du -h cctv.m3u 2>/dev/null | cut -f1 || echo '未生成')"
          echo "========================================"
