name: 更新 CCTV 直播源 M3U

# 权限设置：必须允许写入内容，否则无法提交文件
permissions:
  contents: write
  actions: read

on:
  schedule:
    # 每 6 小时运行一次 (UTC 时间 2, 8, 14, 20 点)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          # 使用默认 token 即可
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖 (针对 Playwright)
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
          libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
          libxrandr2 libgbm1 libasound2t64 libxshmfence1 libglib2.0-0

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          # 安装 chromium 内核及必要的运行环境
          playwright install chromium --with-deps

      - name: 运行抓取脚本
        # 确保你的 Python 文件名是 main.py
        run: python main.py

      - name: 提交并推送到仓库
        run: |
          # 配置 git 用户信息
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 检查文件是否存在
          if [ -f cctv_live.m3u ]; then
            git add cctv_live.m3u
            
            # 检查是否有内容变动
            if git diff --staged --quiet; then
              echo "✅ 文件内容无变化，无需更新"
            else
              git commit -m "📺 自动更新 CCTV 直播源 $(date '+%Y-%m-%d %H:%M:%S')"
              
              # 【核心修复】先拉取远程改动并变基，防止 push 冲突
              # 如果远程有新提交，这行会将本地提交“接”在远程提交之后
              git pull --rebase origin main
              
              # 推送回仓库
              git push origin main
              echo "🚀 M3U 文件已成功更新并推送到仓库"
            fi
          else
            echo "❌ 错误：未找到生成的 cctv_live.m3u 文件"
            exit 1
          fi
